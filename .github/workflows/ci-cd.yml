name: CI-CD to EC2 via CodeBuild + CodeDeploy

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}
  ECR_REGISTRY: ${{ vars.ECR_REGISTRY }}
  IMAGE_TAG: ${{ github.sha }}
  APP_NAME: ${{ vars.CODEDEPLOY_APP_NAME }}
  DEPLOYMENT_GROUP: ${{ vars.CODEDEPLOY_DEPLOYMENT_GROUP }}
  S3_BUCKET: ${{ vars.CODEDEPLOY_S3_BUCKET }}
  CODEBUILD_PROJECT: ${{ vars.CODEBUILD_PROJECT }}

jobs:
  test-build-push:
    name: Test, Build, Push Image
    runs-on:
      - codebuild-${{ vars.CODEBUILD_PROJECT }}-${{ github.run_id }}-${{ github.run_attempt }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Run tests
        run: mvn -B clean test

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest

      - name: Push Docker image
        run: |
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

  deploy:
    name: Deploy to EC2 with CodeDeploy
    runs-on: ubuntu-latest
    needs: test-build-push
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Create deployment bundle
        run: |
          mkdir -p revision
          cp codedeploy/appspec.yml revision/appspec.yml
          cp -r codedeploy/scripts revision/scripts
          cp docker-compose.prod.yml revision/docker-compose.prod.yml
          cp .env.example revision/.env.example
          printf '%s' "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" > revision/IMAGE_URI
          cd revision && zip -r ../deployment-${GITHUB_SHA}.zip .

      - name: Upload bundle to S3
        run: |
          aws s3 cp deployment-${GITHUB_SHA}.zip s3://$S3_BUCKET/deployment-${GITHUB_SHA}.zip

      - name: Create CodeDeploy deployment
        run: |
          aws deploy create-deployment \
            --application-name "$APP_NAME" \
            --deployment-group-name "$DEPLOYMENT_GROUP" \
            --s3-location bucket=$S3_BUCKET,bundleType=zip,key=deployment-${GITHUB_SHA}.zip \
            --description "GitHub Actions deployment for ${GITHUB_SHA}"
